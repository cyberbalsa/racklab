openapi: 3.1.0
info:
  title: 'RackLab API'
  description: 'Public API for RackLab automation and integrations.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost'
tags:
  -
    name: Endpoints
    description: ''
components:
  securitySchemes:
    default:
      type: apiKey
      name: Authorization
      in: header
      description: 'Use `Token <opaque PAT>` for Track-B tokens, or `Bearer <jwt>` for Track-A delegated JWTs.'
security:
  -
    default: []
paths:
  '/api/v1/provisioning/host-keys/{token}':
    post:
      summary: 'Record deployment host keys'
      operationId: postApiV1ProvisioningHostKeysToken
      description: 'Records guest-reported host public keys for a deployment-scoped phone-home token.'
      parameters: []
      responses:
        200:
          description: 'Existing resource returned for an idempotent replay.'
          content:
            application/json:
              example:
                data:
                  deployment_id: 01HZDEPLOYMENT000000000000
                  keys_recorded: 1
                  keys:
                    -
                      id: 01HZHOSTKEY00000000000000
                      tenant_id: 01HZTENANT0000000000000000
                      deployment_id: 01HZDEPLOYMENT000000000000
                      deployment_resource_id: 01HZRESOURCE00000000000000
                      key_type: ssh-ed25519
                      public_key: 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIRackLabHostKey guest@example'
                      fingerprint: 'SHA256:exampleHostKeyFingerprint'
                      first_seen_at: '2026-05-27T19:00:00.000000Z'
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      deployment_id:
                        type: string
                      keys_recorded:
                        type: integer
                      keys:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            tenant_id:
                              type: string
                            deployment_id:
                              type: string
                            deployment_resource_id:
                              type: string
                            key_type:
                              type: string
                            public_key:
                              type: string
                            fingerprint:
                              type: string
                            first_seen_at:
                              type: string
                          required:
                            - id
                            - tenant_id
                            - deployment_id
                            - deployment_resource_id
                            - key_type
                            - public_key
                            - fingerprint
                            - first_seen_at
                    required:
                      - deployment_id
                      - keys_recorded
                      - keys
                required:
                  - data
                examples:
                  -
                    data:
                      deployment_id: 01HZDEPLOYMENT000000000000
                      keys_recorded: 1
                      keys:
                        -
                          id: 01HZHOSTKEY00000000000000
                          tenant_id: 01HZTENANT0000000000000000
                          deployment_id: 01HZDEPLOYMENT000000000000
                          deployment_resource_id: 01HZRESOURCE00000000000000
                          key_type: ssh-ed25519
                          public_key: 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIRackLabHostKey guest@example'
                          fingerprint: 'SHA256:exampleHostKeyFingerprint'
                          first_seen_at: '2026-05-27T19:00:00.000000Z'
        201:
          description: 'Resource created.'
          content:
            application/json:
              example:
                data:
                  deployment_id: 01HZDEPLOYMENT000000000000
                  keys_recorded: 1
                  keys:
                    -
                      id: 01HZHOSTKEY00000000000000
                      tenant_id: 01HZTENANT0000000000000000
                      deployment_id: 01HZDEPLOYMENT000000000000
                      deployment_resource_id: 01HZRESOURCE00000000000000
                      key_type: ssh-ed25519
                      public_key: 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIRackLabHostKey guest@example'
                      fingerprint: 'SHA256:exampleHostKeyFingerprint'
                      first_seen_at: '2026-05-27T19:00:00.000000Z'
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      deployment_id:
                        type: string
                      keys_recorded:
                        type: integer
                      keys:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            tenant_id:
                              type: string
                            deployment_id:
                              type: string
                            deployment_resource_id:
                              type: string
                            key_type:
                              type: string
                            public_key:
                              type: string
                            fingerprint:
                              type: string
                            first_seen_at:
                              type: string
                          required:
                            - id
                            - tenant_id
                            - deployment_id
                            - deployment_resource_id
                            - key_type
                            - public_key
                            - fingerprint
                            - first_seen_at
                    required:
                      - deployment_id
                      - keys_recorded
                      - keys
                required:
                  - data
                examples:
                  -
                    data:
                      deployment_id: 01HZDEPLOYMENT000000000000
                      keys_recorded: 1
                      keys:
                        -
                          id: 01HZHOSTKEY00000000000000
                          tenant_id: 01HZTENANT0000000000000000
                          deployment_id: 01HZDEPLOYMENT000000000000
                          deployment_resource_id: 01HZRESOURCE00000000000000
                          key_type: ssh-ed25519
                          public_key: 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIRackLabHostKey guest@example'
                          fingerprint: 'SHA256:exampleHostKeyFingerprint'
                          first_seen_at: '2026-05-27T19:00:00.000000Z'
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                keys:
                  type: array
                  description: 'Host public keys reported by the guest during first boot. Must have at least 1 items.'
                  items:
                    type: object
                    properties:
                      public_key:
                        type: string
                        description: 'OpenSSH-formatted host public key. Must not be greater than 4096 characters.'
                        examples:
                          - 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIRackLabHostKey guest@example'
                    required:
                      - public_key
                  examples:
                    -
                      -
                        public_key: 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIRackLabHostKey guest@example'
              required:
                - keys
    parameters:
      -
        in: path
        name: token
        description: ''
        required: true
        schema:
          type: string
          examples:
            - architecto
  /api/v1/me:
    get:
      summary: 'Show current API user'
      operationId: getApiV1Me
      description: 'Returns the authenticated user and active tenant context.'
      parameters: []
      responses:
        200:
          description: 'Resource representation.'
          content:
            application/json:
              example:
                data:
                  id: 17
                  name: 'Ada Lovelace'
                  email: ada@example.edu
                  tenant:
                    id: 01HZTENANT0000000000000000
                    name: 'Default Tenant'
                    slug: default
                  profile:
                    display_name: 'Ada Lovelace'
                    locale: en
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
                      tenant:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          slug:
                            type: string
                        required:
                          - id
                          - name
                          - slug
                      profile:
                        type: object
                        properties:
                          display_name:
                            type: string
                          locale:
                            type: string
                        required:
                          - display_name
                          - locale
                    required:
                      - id
                      - name
                      - email
                      - tenant
                      - profile
                required:
                  - data
                examples:
                  -
                    data:
                      id: 17
                      name: 'Ada Lovelace'
                      email: ada@example.edu
                      tenant:
                        id: 01HZTENANT0000000000000000
                        name: 'Default Tenant'
                        slug: default
                      profile:
                        display_name: 'Ada Lovelace'
                        locale: en
      tags:
        - Endpoints
  '/api/v1/artifacts/{id}':
    get:
      summary: 'Download artifact'
      operationId: getApiV1ArtifactsId
      description: 'Streams authorized artifact bytes without exposing internal storage paths.'
      parameters: []
      responses:
        200:
          description: 'Artifact bytes.'
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
      tags:
        - Endpoints
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the artifact.'
        required: true
        schema:
          type: string
          examples:
            - architecto
  /api/v1/catalog/items:
    get:
      summary: 'List catalog items'
      operationId: getApiV1CatalogItems
      description: 'Lists catalog items visible to the authenticated actor.'
      parameters: []
      responses:
        200:
          description: 'Resource collection.'
          content:
            application/json:
              example:
                data:
                  -
                    id: 01HZCATALOG00000000000000
                    tenant_id: 01HZTENANT0000000000000000
                    name: 'Kali Workstation'
                    slug: kali-workstation
                    description: 'Single-VM workstation template for introductory labs.'
                    sharing_scope: tenant_local
                    current_version:
                      id: 01HZCATVERSION00000000000
                      catalog_item_id: 01HZCATALOG00000000000000
                      stack_definition_id: 01HZSTACK0000000000000000
                      version: '2026.05'
                      state: published
                      summary: 'Initial RackLab MVP template.'
                      published_at: '2026-05-27T19:00:00.000000Z'
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        tenant_id:
                          type: string
                        name:
                          type: string
                        slug:
                          type: string
                        description:
                          type: string
                        sharing_scope:
                          type: string
                        current_version:
                          type: object
                          properties:
                            id:
                              type: string
                            catalog_item_id:
                              type: string
                            stack_definition_id:
                              type: string
                            version:
                              type: string
                            state:
                              type: string
                            summary:
                              type: string
                            published_at:
                              type: string
                          required:
                            - id
                            - catalog_item_id
                            - stack_definition_id
                            - version
                            - state
                            - summary
                            - published_at
                      required:
                        - id
                        - tenant_id
                        - name
                        - slug
                        - description
                        - sharing_scope
                        - current_version
                required:
                  - data
                examples:
                  -
                    data:
                      -
                        id: 01HZCATALOG00000000000000
                        tenant_id: 01HZTENANT0000000000000000
                        name: 'Kali Workstation'
                        slug: kali-workstation
                        description: 'Single-VM workstation template for introductory labs.'
                        sharing_scope: tenant_local
                        current_version:
                          id: 01HZCATVERSION00000000000
                          catalog_item_id: 01HZCATALOG00000000000000
                          stack_definition_id: 01HZSTACK0000000000000000
                          version: '2026.05'
                          state: published
                          summary: 'Initial RackLab MVP template.'
                          published_at: '2026-05-27T19:00:00.000000Z'
      tags:
        - Endpoints
  '/api/v1/catalog/items/{catalogItem}/versions/{id}':
    get:
      summary: 'Show catalog version'
      operationId: getApiV1CatalogItemsCatalogItemVersionsId
      description: 'Returns a published catalog version and its Stack definition payload.'
      parameters: []
      responses:
        200:
          description: 'Resource representation.'
          content:
            application/json:
              example:
                data:
                  id: 01HZCATVERSION00000000000
                  catalog_item_id: 01HZCATALOG00000000000000
                  stack_definition_id: 01HZSTACK0000000000000000
                  version: '2026.05'
                  state: published
                  summary: 'Initial RackLab MVP template.'
                  published_at: '2026-05-27T19:00:00.000000Z'
                  stack_definition:
                    id: 01HZSTACK0000000000000000
                    name: 'Kali Workstation'
                    slug: kali-workstation
                    definition:
                      version: 1
                      components:
                        -
                          key: vm
                          kind: vm
                          image: kali-2026.1
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      catalog_item_id:
                        type: string
                      stack_definition_id:
                        type: string
                      version:
                        type: string
                      state:
                        type: string
                      summary:
                        type: string
                      published_at:
                        type: string
                      stack_definition:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          slug:
                            type: string
                          definition:
                            type: object
                            properties:
                              version:
                                type: integer
                              components:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    key:
                                      type: string
                                    kind:
                                      type: string
                                    image:
                                      type: string
                                  required:
                                    - key
                                    - kind
                                    - image
                            required:
                              - version
                              - components
                        required:
                          - id
                          - name
                          - slug
                          - definition
                    required:
                      - id
                      - catalog_item_id
                      - stack_definition_id
                      - version
                      - state
                      - summary
                      - published_at
                      - stack_definition
                required:
                  - data
                examples:
                  -
                    data:
                      id: 01HZCATVERSION00000000000
                      catalog_item_id: 01HZCATALOG00000000000000
                      stack_definition_id: 01HZSTACK0000000000000000
                      version: '2026.05'
                      state: published
                      summary: 'Initial RackLab MVP template.'
                      published_at: '2026-05-27T19:00:00.000000Z'
                      stack_definition:
                        id: 01HZSTACK0000000000000000
                        name: 'Kali Workstation'
                        slug: kali-workstation
                        definition:
                          version: 1
                          components:
                            -
                              key: vm
                              kind: vm
                              image: kali-2026.1
      tags:
        - Endpoints
    parameters:
      -
        in: path
        name: catalogItem
        description: ''
        required: true
        schema:
          type: string
          examples:
            - architecto
      -
        in: path
        name: id
        description: 'The ID of the version.'
        required: true
        schema:
          type: string
          examples:
            - architecto
  /api/v1/courses:
    get:
      summary: 'List courses'
      operationId: getApiV1Courses
      description: 'Lists courses readable through RackLab tenant RBAC.'
      parameters: []
      responses:
        200:
          description: 'Resource collection.'
          content:
            application/json:
              example:
                data:
                  -
                    id: 01HZCOURSE0000000000000000
                    name: SEC-101
                    slug: sec-101
                    tenant_id: 01HZTENANT0000000000000000
                    description: 'Introductory security lab course.'
                    sharing_scope: tenant_local
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        slug:
                          type: string
                        tenant_id:
                          type: string
                        description:
                          type: string
                        sharing_scope:
                          type: string
                      required:
                        - id
                        - name
                        - slug
                        - tenant_id
                        - description
                        - sharing_scope
                required:
                  - data
                examples:
                  -
                    data:
                      -
                        id: 01HZCOURSE0000000000000000
                        name: SEC-101
                        slug: sec-101
                        tenant_id: 01HZTENANT0000000000000000
                        description: 'Introductory security lab course.'
                        sharing_scope: tenant_local
      tags:
        - Endpoints
  /api/v1/network-offerings:
    post:
      summary: 'Create network offering'
      operationId: postApiV1NetworkOfferings
      description: 'Publishes an admin-managed provider network offering and its management-plane reachability capability.'
      parameters: []
      responses:
        200:
          description: 'Existing resource returned for an idempotent replay.'
          content:
            application/json:
              example:
                data:
                  id: 01HZNETOFFERING000000000
                  tenant_id: 01HZTENANT0000000000000000
                  name: 'Private isolated'
                  slug: private-isolated
                  offering_type: private-isolated
                  reachability: isolated_no_ingress
                  metadata: []
                  provider_network:
                    id: 01HZPROVIDERNETWORK000000
                    name: 'Isolated bridge'
                    slug: isolated-bridge
                    provider: proxmox
                    provider_cluster: default
                    network_type: bridge
                    external_id: vmbr100
                    bridge: vmbr100
                    vlan_tag: null
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      tenant_id:
                        type: string
                      name:
                        type: string
                      slug:
                        type: string
                      offering_type:
                        type: string
                      reachability:
                        type: string
                      metadata:
                        type: array
                        items:
                          type: object
                      provider_network:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          slug:
                            type: string
                          provider:
                            type: string
                          provider_cluster:
                            type: string
                          network_type:
                            type: string
                          external_id:
                            type: string
                          bridge:
                            type: string
                          vlan_tag:
                            type: 'null'
                        required:
                          - id
                          - name
                          - slug
                          - provider
                          - provider_cluster
                          - network_type
                          - external_id
                          - bridge
                          - vlan_tag
                    required:
                      - id
                      - tenant_id
                      - name
                      - slug
                      - offering_type
                      - reachability
                      - metadata
                      - provider_network
                required:
                  - data
                examples:
                  -
                    data:
                      id: 01HZNETOFFERING000000000
                      tenant_id: 01HZTENANT0000000000000000
                      name: 'Private isolated'
                      slug: private-isolated
                      offering_type: private-isolated
                      reachability: isolated_no_ingress
                      metadata: []
                      provider_network:
                        id: 01HZPROVIDERNETWORK000000
                        name: 'Isolated bridge'
                        slug: isolated-bridge
                        provider: proxmox
                        provider_cluster: default
                        network_type: bridge
                        external_id: vmbr100
                        bridge: vmbr100
                        vlan_tag: null
        201:
          description: 'Resource created.'
          content:
            application/json:
              example:
                data:
                  id: 01HZNETOFFERING000000000
                  tenant_id: 01HZTENANT0000000000000000
                  name: 'Private isolated'
                  slug: private-isolated
                  offering_type: private-isolated
                  reachability: isolated_no_ingress
                  metadata: []
                  provider_network:
                    id: 01HZPROVIDERNETWORK000000
                    name: 'Isolated bridge'
                    slug: isolated-bridge
                    provider: proxmox
                    provider_cluster: default
                    network_type: bridge
                    external_id: vmbr100
                    bridge: vmbr100
                    vlan_tag: null
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      tenant_id:
                        type: string
                      name:
                        type: string
                      slug:
                        type: string
                      offering_type:
                        type: string
                      reachability:
                        type: string
                      metadata:
                        type: array
                        items:
                          type: object
                      provider_network:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          slug:
                            type: string
                          provider:
                            type: string
                          provider_cluster:
                            type: string
                          network_type:
                            type: string
                          external_id:
                            type: string
                          bridge:
                            type: string
                          vlan_tag:
                            type: 'null'
                        required:
                          - id
                          - name
                          - slug
                          - provider
                          - provider_cluster
                          - network_type
                          - external_id
                          - bridge
                          - vlan_tag
                    required:
                      - id
                      - tenant_id
                      - name
                      - slug
                      - offering_type
                      - reachability
                      - metadata
                      - provider_network
                required:
                  - data
                examples:
                  -
                    data:
                      id: 01HZNETOFFERING000000000
                      tenant_id: 01HZTENANT0000000000000000
                      name: 'Private isolated'
                      slug: private-isolated
                      offering_type: private-isolated
                      reachability: isolated_no_ingress
                      metadata: []
                      provider_network:
                        id: 01HZPROVIDERNETWORK000000
                        name: 'Isolated bridge'
                        slug: isolated-bridge
                        provider: proxmox
                        provider_cluster: default
                        network_type: bridge
                        external_id: vmbr100
                        bridge: vmbr100
                        vlan_tag: null
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Human-readable network offering name. Must not be greater than 160 characters.'
                  examples:
                    - 'Private isolated'
                slug:
                  type: string
                  description: 'Tenant-unique network offering slug used by Stack definitions. Must match the regex /^[a-z0-9][a-z0-9-]*$/. Must not be greater than 160 characters.'
                  examples:
                    - private-isolated
                offering_type:
                  type: string
                  description: 'Productized network offering type.'
                  enum:
                    - private-isolated
                    - private-nat
                    - double-nat
                    - provider-direct
                    - template-defined
                  examples:
                    - private-isolated
                reachability:
                  type: string
                  description: 'Management-plane reachability capability consumed by SSH/console surfaces.'
                  enum:
                    - routable_from_management
                    - nat_from_management
                    - isolated_no_ingress
                  examples:
                    - isolated_no_ingress
                provider_network:
                  type: object
                  description: 'Backend provider network mapping selected by the administrator.'
                  properties:
                    name:
                      type: string
                      description: 'Must not be greater than 160 characters.'
                      examples:
                        - b
                    provider:
                      type: string
                      description: 'Must not be greater than 80 characters.'
                      examples:
                        - proxmox
                    provider_cluster:
                      type:
                        - string
                        - 'null'
                      description: 'Must not be greater than 120 characters.'
                      examples:
                        - 'n'
                    external_id:
                      type: string
                      description: 'Must not be greater than 160 characters.'
                      examples:
                        - vmbr100
                    network_type:
                      type: string
                      description: ''
                      enum:
                        - bridge
                        - vlan
                        - vnet
                        - sdn_zone
                      examples:
                        - bridge
                    bridge:
                      type:
                        - string
                        - 'null'
                      description: 'Must not be greater than 120 characters.'
                      examples:
                        - g
                    vlan_tag:
                      type:
                        - integer
                        - 'null'
                      description: 'Must be at least 1. Must not be greater than 4094.'
                      examples:
                        - 16
                    metadata:
                      type:
                        - object
                        - 'null'
                      description: ''
                      properties: {  }
                      examples:
                        - null
                  required:
                    - name
                    - provider
                    - external_id
                    - network_type
                  examples:
                    -
                      provider: proxmox
                      network_type: bridge
                      external_id: vmbr100
                metadata:
                  type:
                    - object
                    - 'null'
                  description: 'Offering metadata such as static NAT gateway host/port information.'
                  properties: {  }
                  examples:
                    -
                      nat:
                        host: 198.51.100.10
                        port: 2201
              required:
                - name
                - slug
                - offering_type
                - reachability
                - provider_network
  /api/v1/networks:
    post:
      summary: 'Create project network'
      operationId: postApiV1Networks
      description: 'Creates a self-service project network and initial subnet from an approved network offering.'
      parameters: []
      responses:
        200:
          description: 'Existing resource returned for an idempotent replay.'
          content:
            application/json:
              example:
                data:
                  id: 01HZNETWORK0000000000000
                  tenant_id: 01HZTENANT0000000000000000
                  project_id: 01HZPROJECT000000000000000
                  network_offering_id: 01HZNETOFFERING000000000
                  offering_slug: private-nat
                  name: 'Student NAT network'
                  slug: student-nat
                  state: active
                  provider: fake
                  reachability: nat_from_management
                  metadata:
                    offering_type: private-nat
                  subnets:
                    -
                      id: 01HZSUBNET00000000000000
                      subnet_pool_id: 01HZSUBNETPOOL000000000
                      cidr: 10.42.0.0/24
                      ip_version: 4
                      gateway_ip: 10.42.0.1
                      dhcp_enabled: true
                      allocation_pools: []
                      dns_nameservers:
                        - 1.1.1.1
                      host_routes: []
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      tenant_id:
