                      examples:
                        - student-private-pool
                    prefix_length:
                      type:
                        - integer
                        - 'null'
                      description: 'Requested prefix length for pool-backed allocation. Must be between 1 and 32.'
                      examples:
                        - 24
                    gateway_ip:
                      type:
                        - string
                        - 'null'
                      description: 'Optional subnet gateway address. Must be a valid IP address.'
                      examples:
