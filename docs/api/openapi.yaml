                        type:
                          - object
                          - 'null'
                        properties:
                          start:
                            type: string
                            description: 'Allocation pool start address. This field is required when <code>subnet.allocation_pools</code> is present. Must be a valid IP address.'
                            examples:
                              - 10.42.0.20
                          end:
                            type: string
                            description: 'Allocation pool end address. This field is required when <code>subnet.allocation_pools</code> is present. Must be a valid IP address.'
                            examples:
                              - 10.42.0.200
                      examples:
                        -
                          -
                            start: 10.42.0.20
                            end: 10.42.0.200
                    dns_nameservers:
                      type: array
                      description: 'DNS resolver IP address. Must be a valid IP address.'
                      items:
                        type: string
                      examples:
