                    host_routes:
                      type: array
                      description: 'Optional static routes advertised to guests.'
                      items:
                        type:
                          - object
                          - 'null'
                        properties:
                          destination:
                            type: string
                            description: 'Static route destination CIDR. This field is required when <code>subnet.host_routes</code> is present. Must match the regex /^([0-9]{1,3}\.){3}[0-9]{1,3}\/([0-9]|[12][0-9]|3[0-2])$/.'
                            examples:
                              - 10.50.0.0/16
                          nexthop:
                            type: string
                            description: 'Static route next-hop address. This field is required when <code>subnet.host_routes</code> is present. Must be a valid IP address.'
                            examples:
                              - 10.42.0.1
                      examples:
                        -
                          -
                            destination: 10.50.0.0/16
                            nexthop: 10.42.0.1
                  examples:
                    -
                      subnet_pool_slug: student-private-pool
                      prefix_length: 24
                      gateway_ip: 10.42.0.1
                metadata:
                  type:
                    - object
                    - 'null'
                  description: 'Optional network metadata.'
                  properties: {  }
                  examples:
                    -
                      purpose: lab
              required:
                - project_id
                - name
                - slug
                - subnet
