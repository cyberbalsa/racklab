                        - 'null'
                      description: 'Explicit IPv4 CIDR for the initial subnet. This field is required when none of <code>subnet.subnet_pool_id</code> and <code>subnet.subnet_pool_slug</code> are present. Must match the regex /^([0-9]{1,3}\.){3}[0-9]{1,3}\/([0-9]|[12][0-9]|3[0-2])$/.'
