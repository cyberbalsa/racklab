name: Build Images CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SYFT_VERSION: v1.44.0

jobs:
  build-images:
    name: ${{ matrix.image }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: web
            target: web
          - image: reverb
            target: reverb
          - image: horizon
            target: horizon
          - image: scheduler-reconciler
            target: scheduler-reconciler

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build local image
        env:
          IMAGE: ${{ matrix.image }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          LOCAL_IMAGE="racklab/${IMAGE}:ci-${GITHUB_SHA}"
          echo "LOCAL_IMAGE=${LOCAL_IMAGE}" >> "$GITHUB_ENV"
          docker build \
            --file Containerfile \
            --target "${TARGET}" \
            --tag "${LOCAL_IMAGE}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

      - name: Composer audit inside image
        run: docker run --rm "$LOCAL_IMAGE" composer audit --no-interaction

      - name: Artisan smoke inside image
        run: docker run --rm -e APP_ENV=testing -e APP_KEY=base64:YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE= -e BROADCAST_CONNECTION=null "$LOCAL_IMAGE" php artisan --version

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin "$SYFT_VERSION"
          syft version

      - name: Generate CycloneDX SBOM
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          mkdir -p dist/sboms
          syft "$LOCAL_IMAGE" -o cyclonedx-json > "dist/sboms/${IMAGE}.cdx.json"
          syft "$LOCAL_IMAGE" -o json > "dist/sboms/${IMAGE}.syft.json"

      - name: Upload image SBOM
        uses: actions/upload-artifact@v4
        with:
          name: image-sbom-${{ matrix.image }}
          path: |
            dist/sboms/${{ matrix.image }}.cdx.json
            dist/sboms/${{ matrix.image }}.syft.json

      - name: Grype full report
        uses: anchore/scan-action@v7
        with:
          sbom: dist/sboms/${{ matrix.image }}.cdx.json
          fail-build: false
          severity-cutoff: low
          only-fixed: false
          output-format: sarif
          output-file: grype-${{ matrix.image }}-full.sarif

      - name: Upload full SARIF
        if: always()
        continue-on-error: true  # fork PRs lack security-events: write; tolerate upload failure
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype-${{ matrix.image }}-full.sarif
          category: grype-${{ matrix.image }}-full

      - name: Grype fixed-CVE failure gate
        uses: anchore/scan-action@v7
        with:
          sbom: dist/sboms/${{ matrix.image }}.cdx.json
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          config: .grype.yaml
          output-format: table

      - name: License policy gate
        env:
          IMAGE: ${{ matrix.image }}
        run: bash scripts/ci/check-image-licenses.sh "dist/sboms/${IMAGE}.syft.json" .github/license-policy.allowlist.json

      - name: Publish image
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          REGISTRY_IMAGE="ghcr.io/cyberbalsa/racklab/${IMAGE}"
          tags=("${REGISTRY_IMAGE}:sha-${GITHUB_SHA::12}")

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags+=("${REGISTRY_IMAGE}:main")
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tags+=("${REGISTRY_IMAGE}:${GITHUB_REF_NAME}")
          fi

          for tag in "${tags[@]}"; do
            docker tag "$LOCAL_IMAGE" "$tag"
            docker push "$tag"
          done

      - name: Tag legacy aliases for one release cycle
        # The horizon image replaces four legacy per-pool images. Publish
        # mirror tags so external integrators pulling the old names keep
        # working through one release cycle. Drop this block once the
        # consumers have been migrated.
        if: github.event_name != 'pull_request' && matrix.image == 'horizon'
        env:
          SOURCE: ghcr.io/cyberbalsa/racklab/horizon
        run: |
          set -euo pipefail
          for alias in provider-worker script-worker console-worker notification-worker; do
            ALIAS_IMAGE="ghcr.io/cyberbalsa/racklab/${alias}"
            tags=("${ALIAS_IMAGE}:sha-${GITHUB_SHA::12}")
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              tags+=("${ALIAS_IMAGE}:main")
            fi
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              tags+=("${ALIAS_IMAGE}:${GITHUB_REF_NAME}")
            fi
            for tag in "${tags[@]}"; do
              docker tag "$LOCAL_IMAGE" "$tag"
              docker push "$tag"
            done
          done
